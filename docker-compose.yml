version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-bank
    restart: always
    environment:
      POSTGRES_DB: bank_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  account-service:
    build:
      context: ./account-service
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: